name: KOI API Tests
on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 2 * * *'

jobs:
  newman:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '16'

      - name: Install newman
        run: npm install -g newman newman-reporter-html

      - name: Run Newman
        run: |
          mkdir -p report || true
          newman run postman/jira-api-collection.json -e postman/jira-environment.json \
            -r cli,html,json --reporter-html-export report/report.html \
            --reporter-json-export report/report.json || true

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Python requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Auto-create Jira issues for failures
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
        run: |
          python scripts/auto_create_jira.py --report report/report.json || true

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: api-test-report
          path: report/
