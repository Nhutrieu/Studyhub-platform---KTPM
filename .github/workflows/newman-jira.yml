name: Newman API Test + Jira Integration

on:
  push:
    branches:
      - '**'
    paths:
      - 'Tool/postman/**' # Chỉ chạy khi có thay đổi trong bộ test Postman
      - '.github/workflows/newman-jira.yml'

jobs:
  api-testing:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      # 1. Trích xuất mã ticket Jira từ commit message (ví dụ: SH-76)
      - name: Extract Jira Key from Commit
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B || true)
          JIRA_KEY=$(echo "$COMMIT_MSG" | grep -oE "[A-Z]+-[0-9]+" | head -n 1 || true)
          if [ -z "$JIRA_KEY" ]; then
            echo "No Jira ID found. Skipping Jira integration."
            echo "HAS_KEY=false" >> $GITHUB_ENV
          else
            echo "JIRA_KEY=$JIRA_KEY" >> $GITHUB_ENV
            echo "HAS_KEY=true" >> $GITHUB_ENV
          fi

      # 2. Cài đặt Newman & jq
      - name: Setup Node
        if: env.HAS_KEY == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Newman + jq
        if: env.HAS_KEY == 'true'
        run: |
          npm install -g newman
          sudo apt-get update && sudo apt-get install -y jq

      - name: Setup Backend Environment
        if: env.HAS_KEY == 'true'
        run: |
          for d in backend/*_service; do
            if [ -f "$d/.env.example" ]; then
              cp "$d/.env.example" "$d/.env"
            fi
          done

      - name: Prepare Postman file fixtures
        if: env.HAS_KEY == 'true'
        run: |
          mkdir -p Tool/postman/fixtures
          if [ ! -f "Tool/postman/fixtures/document-sample.pdf" ]; then
            printf 'StudyHub document upload fixture\n' > "Tool/postman/fixtures/document-sample.pdf"
          fi
          truncate -s 101M "Tool/postman/fixtures/oversized-file-over-100mb.zip"

      - name: Start Docker Compose
        if: env.HAS_KEY == 'true'
        run: |
          cd deployment/docker
          docker compose up -d --build
          echo "Waiting for backend services to boot..."
          sleep 45

      # 3. Lọc file thay đổi và chạy Newman
      - name: Run Newman Only On Committed Files
        if: env.HAS_KEY == 'true'
        run: |
          # Tìm các file collection .json bị thay đổi trong commit
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD | grep -E "Tool/postman/.*\.json$" | grep -v "package.json" || true)

          if [ -z "$CHANGED_FILES" ]; then
            echo "NEWMAN_STATUS=SKIP" >> $GITHUB_ENV
            exit 0
          fi

          API_URL="${{ secrets.API_BASE_URL }}"
          if [ -z "$API_URL" ]; then
            echo "secrets.API_BASE_URL chưa cấu hình. Đang chuyển hướng sang Docker Backend (http://localhost:8000)..."
            API_URL="http://localhost:8000"
          fi

          mkdir -p newman-reports
          ANY_FAIL=false
          OLD_IFS=$IFS
          IFS=$'\n' # Hỗ trợ xử lý tên file có khoảng trắng
          for file in $CHANGED_FILES; do
            if [ -f "$file" ]; then
              # Chạy Newman trỏ về link Staging hoặc Local Docker
              newman run "$file" \
                --env-var "gatewayUrl=$API_URL/api/v1" \
                --env-var "authBaseUrl=$API_URL/api/v1/auth" \
                --env-var "chatBaseUrl=$API_URL/api/v1/chat" \
                --env-var "notificationBaseUrl=$API_URL/api/v1/notification" \
                --env-var "userEmail=admin@example.com" \
                --env-var "password=11111111" \
                -r json --reporter-json-export "newman-reports/$(basename "$file" .json).json" || ANY_FAIL=true
            fi
          done
          IFS=$OLD_IFS

          if [ "$ANY_FAIL" = true ]; then
            echo "NEWMAN_STATUS=FAIL" >> $GITHUB_ENV
            python Tool/postman/parse_newman_report.py --status FAIL
          else
            echo "NEWMAN_STATUS=PASS" >> $GITHUB_ENV
            python Tool/postman/parse_newman_report.py --status PASS
          fi

      # 4. Đăng nhập Jira & chuyển trạng thái/báo lỗi
      - name: Jira Login
        if: env.HAS_KEY == 'true'
        uses: atlassian/gajira-login@v3
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_USER_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}

      - name: Create Jira Sub-task Bug
        if: env.HAS_KEY == 'true' && env.NEWMAN_STATUS == 'FAIL'
        uses: atlassian/gajira-create@v3
        with:
          project: ${{ secrets.JIRA_PROJECT_KEY }}
          issuetype: Subtask # Đúng loại issue con trong Jira của dự án
          fields: '{"parent": {"key": "${{ env.JIRA_KEY }}"}}'
          summary: "${{ env.JIRA_BUG_SUMMARY }}"
          description: "${{ env.JIRA_BUG_DESCRIPTION }}"

      - name: Comment on Jira Issue
        if: env.HAS_KEY == 'true' && env.NEWMAN_STATUS == 'PASS'
        uses: atlassian/gajira-comment@v3
        with:
          issue: ${{ env.JIRA_KEY }}
          comment: "${{ env.JIRA_COMMENT }}"

      - name: Transition Jira Issue to Done
        if: env.HAS_KEY == 'true' && env.NEWMAN_STATUS == 'PASS'
        uses: atlassian/gajira-transition@v3
        with:
          issue: ${{ env.JIRA_KEY }}
          transition: "DONE"
      - name: Fail workflow when Newman fails
        if: env.HAS_KEY == 'true' && env.NEWMAN_STATUS == 'FAIL'
        run: |
          echo "Newman failed. Jira bug/sub-task has been created above, now failing the CI job for visibility."
          exit 1
