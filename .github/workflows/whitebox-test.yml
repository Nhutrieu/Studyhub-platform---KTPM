name: White Box Testing (Jest Unit & Integration Test)

on:
  push:
    branches:
      - '**'
    paths:
      - 'backend/**'
  pull_request:
    branches:
      - '**'
    paths:
      - 'backend/**'

jobs:
  whitebox-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      # 1. Trích xuất mã ticket Jira từ commit message (ví dụ: FM-57)
      - name: Extract Jira Key from Commit
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B || true)
          JIRA_KEY=$(echo "$COMMIT_MSG" | grep -oE "[A-Z]+-[0-9]+" | head -n 1 || true)
          if [ -z "$JIRA_KEY" ]; then
            echo "No Jira ID found. Skipping Jira integration."
            echo "HAS_KEY=false" >> $GITHUB_ENV
          else
            echo "JIRA_KEY=$JIRA_KEY" >> $GITHUB_ENV
            echo "HAS_KEY=true" >> $GITHUB_ENV
          fi

      # 2. Phát hiện service và tệp test tương ứng bằng cách quét động thư mục backend
      - name: Detect Service and Test File
        if: env.HAS_KEY == 'true'
        run: |
          TEST_FILE_PATH=$(find backend -type f -path "*/test/${{ env.JIRA_KEY }}.test.js" | head -n 1)
          if [ -n "$TEST_FILE_PATH" ]; then
            SERVICE_DIR=$(dirname $(dirname "$TEST_FILE_PATH"))
            echo "SERVICE_DIR=$SERVICE_DIR" >> $GITHUB_ENV
            echo "TEST_FILE=test/${{ env.JIRA_KEY }}.test.js" >> $GITHUB_ENV
            echo "CACHE_PATH=$SERVICE_DIR/package-lock.json" >> $GITHUB_ENV
            echo "FOUND_TEST=true" >> $GITHUB_ENV
            echo "Found test file at $TEST_FILE_PATH. Service directory is $SERVICE_DIR."
          else
            echo "FOUND_TEST=false" >> $GITHUB_ENV
          fi

      - name: Setup Node.js
        if: env.HAS_KEY == 'true' && env.FOUND_TEST == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: ${{ env.CACHE_PATH }}

      - name: Install Dependencies
        if: env.HAS_KEY == 'true' && env.FOUND_TEST == 'true'
        run: |
          cd ${{ env.SERVICE_DIR }}
          npm ci

      - name: Run White Box Tests Only On Matching Jira Key
        if: env.HAS_KEY == 'true' && env.FOUND_TEST == 'true'
        run: |
          cd ${{ env.SERVICE_DIR }}
          node --experimental-vm-modules node_modules/jest/bin/jest.js "${{ env.TEST_FILE }}" --json --outputFile=jest-report.json || echo "WHITEBOX_STATUS=FAIL" >> $GITHUB_ENV
          
          if [ ! -f "jest-report.json" ] || grep -q '"status": "failed"' jest-report.json; then
            echo "WHITEBOX_STATUS=FAIL" >> $GITHUB_ENV
            node ../../Tool/postman/parse-jest-report.js FAIL
          else
            echo "WHITEBOX_STATUS=PASS" >> $GITHUB_ENV
            node ../../Tool/postman/parse-jest-report.js PASS
          fi

      - name: Handle Missing Test File
        if: env.HAS_KEY == 'true' && env.FOUND_TEST == 'false'
        run: |
          echo "⚠️ Không tìm thấy file test cho ${{ env.JIRA_KEY }}. Bỏ qua chạy test."
          echo "WHITEBOX_STATUS=SKIP" >> $GITHUB_ENV

      # 4. Đăng nhập Jira & Hành động chuyển trạng thái/báo lỗi
      - name: Jira Login
        if: env.HAS_KEY == 'true'
        uses: atlassian/gajira-login@v3
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_USER_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}

      - name: Create Jira Sub-task Bug
        if: env.HAS_KEY == 'true' && env.WHITEBOX_STATUS == 'FAIL'
        uses: atlassian/gajira-create@v3
        with:
          project: ${{ secrets.JIRA_PROJECT_KEY }}
          issuetype: Subtask
          fields: '{"parent": {"key": "${{ env.JIRA_KEY }}"}}'
          summary: "${{ env.JIRA_BUG_SUMMARY }}"
          description: "${{ env.JIRA_BUG_DESCRIPTION }}"

      - name: Comment on Jira Issue
        if: env.HAS_KEY == 'true' && env.WHITEBOX_STATUS == 'PASS'
        uses: atlassian/gajira-comment@v3
        with:
          issue: ${{ env.JIRA_KEY }}
          comment: "${{ env.JIRA_COMMENT }}"

      - name: Transition Jira Issue to Done
        if: env.HAS_KEY == 'true' && env.WHITEBOX_STATUS == 'PASS'
        uses: atlassian/gajira-transition@v3
        with:
          issue: ${{ env.JIRA_KEY }}
          transition: "DONE"

      - name: Fail workflow if White Box tests failed
        if: env.WHITEBOX_STATUS == 'FAIL'
        run: |
          echo "❌ White Box tests failed. Jira bug has been created or updated."
          exit 1
