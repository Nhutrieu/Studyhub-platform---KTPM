name: Tự động hóa Newman và Đẩy lên Jira

on:
  push:
    branches: ["feature-automation"] # Chạy tự động khi bạn push code lên nhánh test

jobs:
  testing-and-jira:
    runs-on: ubuntu-latest

    steps:
      # 1. Lấy code từ repository về máy ảo của GitHub
      - name: Login
        uses: actions/checkout@v4

      # 2. Cài đặt NodeJS để chạy Newman
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      # 3. Chạy Newman và xuất file log JUnit XML
      - name: FurniMart.postman_collection.json
        id: FurniMart.postman_collection.json
        run: |
          npm install -g newman
          # Nhớ thay đường dẫn thực tế tới file collection của bạn
          newman run path/to/your/collection.json -r junit --reporter-junit-export report-newman.xml
        continue-on-error: true # Dù test fail vẫn chạy tiếp bước sau để gửi log lên Jira

      # 4. Đăng nhập vào Jira (Gọi từ Secrets đã cấu hình trên GitHub)
      - name: FurniMart QA
        uses: atlassian/gajira-login@v3
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_USER_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}

      # 5. Tự động tạo Bug trên Jira nếu bài test thất bại
      - name: Create Jira Issue on Failure
        if: steps.FurniMart.postman_collection.json.outcome == 'failure' # Chỉ tạo bug khi bước test số 3 bị Fail
        uses: atlassian/gajira-create@v3
        with:
          project: "FM" # Điền Key của dự án là FM
          issuetype: "Bug"
          summary: "Newman Automation Test Failed"
          description: "Phát hiện lỗi khi chạy test tự động. Vui lòng kiểm tra lại file log report-newman.xml."
