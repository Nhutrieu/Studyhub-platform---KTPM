name: Tự động hóa Test Chi Tiết và Đẩy Báo Cáo + Ảnh lên Jira

on:
  push:
    branches: ["feature-automation"]

jobs:
  testing-and-jira:
    runs-on: ubuntu-latest

    steps:
      # 1. Lấy code từ repository về máy ảo
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # 2. Cài đặt NodeJS và công cụ phân tích JSON (jq)
      - name: Setup Node.js & Tools
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install jq Analyzer
        run: sudo apt-get update && sudo apt-get install -y jq

      # 3. Chạy Newman Test & Trích xuất chi tiết từng kết quả API
      - name: Run Newman Test (API Detail)
        id: run_newman
        run: |
          npm install -g newman
          FILE_PATH=$(find . -name "FurniMart.postman_collection.json" | head -n 1)
          echo "Đã tìm thấy file tại đường dẫn: $FILE_PATH"

          # Chạy xuất ra file report JSON để phân tích chi tiết từng API
          newman run "$FILE_PATH" -r json --reporter-json-export report-newman.json || true

          # Đọc file JSON để liệt kê chi tiết danh sách API thành công/thất bại
          echo "=== PHÂN TÍCH KẾT QUẢ API ==="
          if [ -f "report-newman.json" ]; then
            TOTAL_FAIL=$(jq '.run.stats.assertions.failed' report-newman.json)
            if [ "$TOTAL_FAIL" -ne "0" ]; then
              echo "NEWMAN_STATUS=FAIL" >> $GITHUB_ENV
              FAILED_APIS=$(jq -r '.run.executions[] | select(.assertions[].error != null) | "- ❌ API: " + .item.name + " (" + .request.method + ")"' report-newman.json | sort -u)
              PASSED_APIS=$(jq -r '.run.executions[] | select(.assertions[].error == null) | "- ✅ API: " + .item.name + " (" + .request.method + ")"' report-newman.json | sort -u)
              
              echo "NEWMAN_DETAILS<<EOF" >> $GITHUB_ENV
              echo "❌ *Phát hiện lỗi API:*"
              echo "$FAILED_APIS"
              echo ""
              echo "✨ *Các API chạy tốt:*"
              echo "$PASSED_APIS"
              echo "EOF" >> $GITHUB_ENV
            else
              echo "NEWMAN_STATUS=PASS" >> $GITHUB_ENV
              echo "NEWMAN_DETAILS=✅ Toàn bộ các API hoạt động đúng đặc tả." >> $GITHUB_ENV
            fi
          else
            echo "NEWMAN_STATUS=FAIL" >> $GITHUB_ENV
            echo "NEWMAN_DETAILS=❌ Không tìm thấy hoặc lỗi định dạng file report-newman.json." >> $GITHUB_ENV
          fi

      # 4. Chạy CodeceptJS Test & Trích xuất chi tiết kịch bản UI / BVA
      - name: Run CodeceptJS Test (UI & BVA Detail)
        id: run_codecept
        run: |
          npm install --legacy-peer-deps

          # Chạy test và ghi đè toàn bộ log màn hình ra file txt để phân tích
          npx codeceptjs run --steps > codecept_output.txt || true

          # Phân tích xem các kịch bản Đăng ký/Đăng nhập/BVA đúng hay sai
          if grep -q "FAIL" codecept_output.txt || grep -q "failed" codecept_output.txt; then
            echo "CODECEPT_STATUS=FAIL" >> $GITHUB_ENV
            UI_ERRORS=$(grep -E "✖|failed|Error:" codecept_output.txt | head -n 10)
            
            echo "CODECEPT_DETAILS<<EOF" >> $GITHUB_ENV
            echo "❌ *Chi tiết kịch bản giao diện thất bại:*"
            echo "$UI_ERRORS"
            echo "EOF" >> $GITHUB_ENV
          else
            echo "CODECEPT_STATUS=PASS" >> $GITHUB_ENV
            echo "CODECEPT_DETAILS=✅ Toàn bộ luồng UI và kịch bản giá trị biên (BVA) đều PASSED." >> $GITHUB_ENV
          fi

      # 5. Đăng nhập vào Jira
      - name: FurniMart QA Login
        uses: atlassian/gajira-login@v3
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}

      # 6. Tự động tạo Task trên Jira chứa báo cáo chuẩn xác
      - name: Create Jira Issue with Deep Details
        id: create_jira
        uses: atlassian/gajira-create@v3
        with:
          project: "FM"
          issuetype: "Task"
          fields: '{"parent": {"key": "FM-2"}}'
          summary: "${{ (env.NEWMAN_STATUS == 'FAIL' || env.CODECEPT_STATUS == 'FAIL') && '🚨 [Automation] Phát hiện LỖI kiểm thử hệ thống' || '✅ [Automation] Kiểm thử hệ thống THÀNH CÔNG' }}"
          description: |
            Báo cáo kiểm thử tự động được kích hoạt từ nhánh `feature-automation`.

            📋 **1. CHI TIẾT TRẠNG THÁI TỪNG API (NEWMAN):**
            ${{ env.NEWMAN_DETAILS }}

            📋 **2. CHI TIẾT KỊCH BẢN GIAO DIỆN & GIÁ TRỊ BIÊN (CODECEPTJS UI/FE):**
            ${{ env.CODECEPT_DETAILS }}

            ---
            *Mã tiến trình chạy:* #${{ github.run_id }}

      # 7. ĐÍNH KÈM TRỰC TIẾP ẢNH LỖI (.png) LÊN TICKET JIRA VỪA TẠO
      - name: Upload Screenshots Directly to Jira Attachment
        if: env.CODECEPT_STATUS == 'FAIL'
        run: |
          echo "Tiến hành quét thư mục output để tìm ảnh lỗi..."
          ISSUE_KEY="${{ steps.create_jira.outputs.issue }}"
          echo "Đang đính kèm file vào Ticket: $ISSUE_KEY"

          find output/ -name "*.png" -type f | while read -r file; do
            echo "Đang tải ảnh lên Jira: $file"
            curl --request POST \
              --url "${{ secrets.JIRA_BASE_URL }}/rest/api/3/issue/$ISSUE_KEY/attachments" \
              --user "${{ secrets.JIRA_USER_EMAIL }}:${{ secrets.JIRA_API_TOKEN }}" \
              --header 'Accept: application/json' \
              --header 'X-Atlassian-Token: no-check' \
              --form "file=@$file"
          done
