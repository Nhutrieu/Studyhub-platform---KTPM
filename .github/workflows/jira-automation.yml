name: Tự động hóa Test Chi Tiết và Đồng bộ Jira

on:
  push:
    branches:
      - feature-automation

jobs:
  testing-and-jira:
    runs-on: ubuntu-latest

    steps:
      ####################################################
      # 1. Checkout Source
      ####################################################

      - name: Checkout Source Code
        uses: actions/checkout@v4

      ####################################################
      # 2. Setup Node + jq
      ####################################################

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm

      - name: Install jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      ####################################################
      # 3. NEWMAN TEST
      ####################################################

      - name: Run Newman API Test
        run: |
          npm install -g newman

          FILE_PATH=$(find . -name "FurniMart.postman_collection.json" | head -n 1)

          echo "Collection: $FILE_PATH"

          newman run "$FILE_PATH" \
            -r json \
            --reporter-json-export report-newman.json || true

          if [ ! -f report-newman.json ]; then

            echo "NEWMAN_STATUS=FAIL" >> $GITHUB_ENV

            cat << EOF >> $GITHUB_ENV
          NEWMAN_REPORT<<END
          ## API Testing Report

          ### Test Description
          Automation API Testing using Newman.

          ### Test Scope
          - Authentication
          - Product
          - Category
          - Cart
          - Order

          ### Dataset
          - Valid Input
          - Invalid Input
          - Empty Input
          - Boundary Value
          - SQL Injection
          - XSS

          ### Expected Result
          API should satisfy business rules.

          ### Actual Result
          Cannot generate report.
          END
          EOF

            exit 0
          fi

          FAIL=$(jq -r '.run.stats.assertions.failed // 0' report-newman.json)

          PASSED=$(jq -r '
          .run.executions[]
          | select(.assertions != null)
          | select(all(.assertions[]?; .error == null))
          | "- " + .item.name
          ' report-newman.json | sort -u)

          FAILED=$(jq -r '
          .run.executions[]
          | select(any(.assertions[]?; .error != null))
          | "- " + .item.name
          ' report-newman.json | sort -u)

          if [ "$FAIL" != "0" ]; then
            echo "NEWMAN_STATUS=FAIL" >> $GITHUB_ENV
          else
            echo "NEWMAN_STATUS=PASS" >> $GITHUB_ENV
          fi

          cat << EOF >> $GITHUB_ENV
          NEWMAN_REPORT<<END
          ## API Testing Report

          ### Test Description
          Automation testing REST API using Newman.

          ### Test Scope
          - Authentication API
          - Product API
          - Category API
          - Cart API
          - Order API

          ### Dataset
          - Valid Input
          - Invalid Input
          - Empty Input
          - Boundary Value
          - SQL Injection
          - XSS

          ### Expected Result
          Status code and response should satisfy business rules.

          ### Passed APIs

          $PASSED

          ### Failed APIs

          $FAILED
          END
          EOF

      ####################################################
      # 4. CODECEPT TEST
      ####################################################

      - name: Run CodeceptJS
        run: |
          npm install --legacy-peer-deps

          npx codeceptjs run --steps > codecept_output.txt || true

          if grep -q "FAIL" codecept_output.txt || grep -q "failed" codecept_output.txt
          then
            echo "CODECEPT_STATUS=FAIL" >> $GITHUB_ENV
          else
            echo "CODECEPT_STATUS=PASS" >> $GITHUB_ENV
          fi

          PASS_CASE=$(grep "✔" codecept_output.txt | head -30)
          FAIL_CASE=$(grep -E "✖|failed|Error:" codecept_output.txt | head -20)

          cat << EOF >> $GITHUB_ENV
          CODECEPT_REPORT<<END
          ## UI Automation Report

          ### Test Description
          Automation UI Testing using CodeceptJS.

          ### Test Scope
          - Login
          - Register
          - Product Detail
          - Add Cart
          - Checkout
          - Logout
          - Boundary Value Validation

          ### Dataset
          - Valid Input
          - Invalid Input
          - Empty Input
          - Boundary Value

          ### Expected Result
          UI should behave correctly.

          ### Passed Testcases

          $PASS_CASE

          ### Failed Testcases

          $FAIL_CASE
          END
          EOF

      ####################################################
      # 5. Jira Login
      ####################################################

      - name: Jira Login
        uses: atlassian/gajira-login@v3
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}

      ####################################################
      # 6. IF FAIL -> CREATE BUG
      ####################################################

      - name: Create Bug
        id: create_bug
        if: env.NEWMAN_STATUS == 'FAIL' || env.CODECEPT_STATUS == 'FAIL'
        uses: atlassian/gajira-create@v3

        with:
          project: FM
          issuetype: BUG
          summary: "[Automation][FAIL] FurniMart Testing"

          description: |
            # Automation Bug Report

            --------------------------------

            ## API TEST

            ${{ env.NEWMAN_REPORT }}

            --------------------------------

            ## UI TEST

            ${{ env.CODECEPT_REPORT }}

            --------------------------------

            Branch:
            feature-automation

            Run:
            #${{ github.run_id }}

      ####################################################
      # 7. Upload Screenshot
      ####################################################

      - name: Upload Screenshots
        if: env.NEWMAN_STATUS == 'FAIL' || env.CODECEPT_STATUS == 'FAIL'
        run: |
          ISSUE=${{ steps.create_bug.outputs.issue }}

          find output -name "*.png" -type f | while read file
          do
            curl \
            --request POST \
            --url "${{ secrets.JIRA_BASE_URL }}/rest/api/3/issue/$ISSUE/attachments" \
            --user "${{ secrets.JIRA_USER_EMAIL }}:${{ secrets.JIRA_API_TOKEN }}" \
            --header "X-Atlassian-Token: no-check" \
            --form "file=@$file"
          done

      ####################################################
      # 8. IF PASS -> MOVE TASK FM-2 TO DONE
      ####################################################

      - name: Transition FM-2 To Done
        if: env.NEWMAN_STATUS == 'PASS' && env.CODECEPT_STATUS == 'PASS'
        run: |
          curl \
          --request POST \
          --url "${{ secrets.JIRA_BASE_URL }}/rest/api/3/issue/FM-2/transitions" \
          --user "${{ secrets.JIRA_USER_EMAIL }}:${{ secrets.JIRA_API_TOKEN }}" \
          --header "Accept: application/json" \
          --header "Content-Type: application/json" \
          --data '{
            "transition": {
              "id": "31"
            }
          }'

      ####################################################
      # 9. COMMENT RESULT
      ####################################################

      - name: Add Automation Comment
        if: env.NEWMAN_STATUS == 'PASS' && env.CODECEPT_STATUS == 'PASS'
        run: |
          curl \
          --request POST \
          --url "${{ secrets.JIRA_BASE_URL }}/rest/api/3/issue/FM-2/comment" \
          --user "${{ secrets.JIRA_USER_EMAIL }}:${{ secrets.JIRA_API_TOKEN }}" \
          --header "Accept: application/json" \
          --header "Content-Type: application/json" \
          --data "{
            \"body\":{
              \"type\":\"doc\",
              \"version\":1,
              \"content\":[
                {
                  \"type\":\"paragraph\",
                  \"content\":[
                    {
                      \"type\":\"text\",
                      \"text\":\"Automation Testing Completed Successfully. API Test PASSED. UI Test PASSED. Dataset: Valid, Invalid, Boundary, Empty Input. Run ID: ${{ github.run_id }}\"
                    }
                  ]
                }
              ]
            }
          }"
