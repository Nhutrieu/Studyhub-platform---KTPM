name: Tự động hóa Newman và Đẩy lên Jira

on:
  push:
    branches: ["feature-automation"] # Tự động chạy khi push lên nhánh feature-automation

jobs:
  testing-and-jira:
    runs-on: ubuntu-latest

    steps:
      # 1. Lấy code từ repository về máy ảo của GitHub
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # 2. Cài đặt NodeJS để chạy Newman
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      # 3. Tự động tìm và chạy Newman bất kể file nằm ở thư mục nào
      - name: Run Newman Test
        id: run_newman
        run: |
          npm install -g newman

          # Lệnh này sẽ tự tìm đường dẫn thực tế của file trên máy ảo
          FILE_PATH=$(find . -name "FurniMart.postman_collection.json" | head -n 1)

          echo "Đã tìm thấy file tại đường dẫn: $FILE_PATH"

          # Chạy Newman bằng đường dẫn vừa tìm được
          newman run "$FILE_PATH" -r junit --reporter-junit-export report-newman.xml
        continue-on-error: true # Dù test fail vẫn chạy tiếp bước sau để gửi log lên Jira

      # 4. Đăng nhập vào Jira (Lấy từ Secrets)
      - name: FurniMart QA Login
        uses: atlassian/gajira-login@v3
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}

      # 5. Tự động tạo Task trên Jira nếu bài test thất bại
      - name: Create Jira Issue on Failure
        if: steps.run_newman.outcome == 'failure' # Chỉ tạo bug khi bước test số 3 bị lỗi
        uses: atlassian/gajira-create@v3
        with:
          project: "FM"
          issuetype: "Task" # Đã đổi thành Task để đồng bộ ngôn ngữ hệ thống Jira của bạn
          summary: "Newman Automation Test Failed"
          description: "Phát hiện lỗi khi chạy test tự động trên nhánh feature-automation. Vui lòng kiểm tra lại file log."
