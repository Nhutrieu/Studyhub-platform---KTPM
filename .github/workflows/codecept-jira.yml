name: CodeceptJS UI Test + Jira

on:
  push:
    branches:
      - '**'

jobs:
  ui-testing:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Extract Jira Key from Commit Message
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B || true)
          JIRA_KEY=$(echo "$COMMIT_MSG" | grep -oE "[A-Z]+-[0-9]+" | head -n 1 || true)
          if [ -z "$JIRA_KEY" ]; then
            echo "No Jira ID found in commit message. Skipping tests."
            echo "HAS_KEY=false" >> $GITHUB_ENV
          else
            echo "JIRA_KEY=$JIRA_KEY" >> $GITHUB_ENV
            echo "HAS_KEY=true" >> $GITHUB_ENV
            echo "Extracted Jira Key: $JIRA_KEY"
          fi

      - name: Setup Node
        if: env.HAS_KEY == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Run CodeceptJS
        if: env.HAS_KEY == 'true'
        run: |
          npm install --legacy-peer-deps

          # Chạy test và ghi log ra file txt
          npx codeceptjs run --steps > codecept_output.txt || true

          # Kiểm tra trạng thái ĐÚNG/SAI
          if grep -qi "fail" codecept_output.txt; then
            echo "CODECEPT_STATUS=FAIL" >> $GITHUB_ENV
          else
            echo "CODECEPT_STATUS=PASS" >> $GITHUB_ENV
          fi

          # Lọc log testcase Pass và Fail (Giới hạn tối đa 20 dòng để tránh vỡ text trên Jira)
          PASS_CASE=$(grep "✔" codecept_output.txt | head -n 20 || true)
          FAIL_CASE=$(grep -E "✖|failed|Error:" codecept_output.txt | head -n 20 || true)

          # Xuất báo cáo chuỗi nhiều dòng an toàn vào GITHUB_ENV sử dụng EOF nguyên bản
          echo "CODECEPT_REPORT<<EOF" >> $GITHUB_ENV
          echo "## UI Automation Testing Report"
          echo "### Test Description"
          echo "Thực hiện kiểm thử giao diện tự động bằng CodeceptJS."
          echo ""
          echo "### Phạm vi kiểm thử"
          echo "- Login"
          echo "- Register"
          echo "- Product Detail"
          echo "- Add To Cart"
          echo "- Update Cart"
          echo "- Checkout"
          echo "- Logout"
          echo "- Form Validation"
          echo ""
          echo "### Dataset"
          echo "- Valid Input / Invalid Input / Empty Input / Boundary Value"
          echo ""
          echo "### Kết quả mong đợi"
          echo "- UI hiển thị chính xác"
          echo "- Điều hướng đúng luồng nghiệp vụ"
          echo "- Hiển thị thông báo lỗi phù hợp"
          echo "- Không phát sinh lỗi JavaScript"
          echo ""
          echo "### 📋 Kết quả kịch bản giao diện thất bại (Failures):"
          if [ -z "$FAIL_CASE" ]; then
            echo "🎉 Tuyệt vời! Toàn bộ kịch bản giao diện đều PASSED."
          else
            echo "$FAIL_CASE"
          fi

          if [ ! -z "$PASS_CASE" ]; then
            echo ""
            echo "### ✨ Kịch bản giao diện thành công (Passed):"
            echo "$PASS_CASE"
          fi
          echo "EOF" >> $GITHUB_ENV

      - name: Jira Login
        if: env.HAS_KEY == 'true'
        uses: atlassian/gajira-login@v3
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_USER_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}

      - name: Create Jira Bug
        id: jira
        if: env.HAS_KEY == 'true' && env.CODECEPT_STATUS == 'FAIL'
        uses: atlassian/gajira-create@v3
        with:
          project: ${{ secrets.JIRA_PROJECT_KEY || 'FM' }}
          issuetype: Task
          fields: '{"parent": {"key": "${{ env.JIRA_KEY }}"}}'
          summary: "🚨 [UI Automation] Tìm thấy lỗi kiểm thử giao diện hệ thống"
          description: |
            Báo cáo kiểm thử tự động được kích hoạt từ nhánh `${{ github.ref_name }}`.

            ${{ env.CODECEPT_REPORT }}

            ---
            *Branch:* `${{ github.ref_name }}`
            *Run ID:* #${{ github.run_id }}

      - name: Upload Screenshot
        if: env.HAS_KEY == 'true' && env.CODECEPT_STATUS == 'FAIL'
        run: |
          ISSUE=${{ steps.jira.outputs.issue }}

          if [ -d output ]; then
            find output -name "*.png" -type f | while read file; do
              echo "Đang đính kèm ảnh lỗi lên Jira: $file"
              curl \
                --request POST \
                --url "${{ secrets.JIRA_BASE_URL }}/rest/api/3/issue/$ISSUE/attachments" \
                --user "${{ secrets.JIRA_EMAIL }}:${{ secrets.JIRA_API_TOKEN }}" \
                --header "X-Atlassian-Token: no-check" \
                --form "file=@$file"
            done
          fi

      - name: Transition Issue to Done
        if: env.HAS_KEY == 'true' && env.CODECEPT_STATUS == 'PASS'
        run: |
          curl --request POST \
            --url "${{ secrets.JIRA_BASE_URL }}/rest/api/3/issue/${{ env.JIRA_KEY }}/transitions" \
            --user "${{ secrets.JIRA_EMAIL }}:${{ secrets.JIRA_API_TOKEN }}" \
            --header "Accept: application/json" \
            --header "Content-Type: application/json" \
            --data '{"transition": {"id": "${{ secrets.JIRA_TRANSITION_DONE_ID || '31' }}"}}'

      - name: Install jq
        if: env.HAS_KEY == 'true' && env.CODECEPT_STATUS == 'PASS'
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Add Success Comment
        if: env.HAS_KEY == 'true' && env.CODECEPT_STATUS == 'PASS'
        run: |
          jq -n \
            --arg report "${{ env.CODECEPT_REPORT }}" \
            --arg run_id "${{ github.run_id }}" \
            '{body: {type: "doc", version: 1, content: [{type: "paragraph", content: [{type: "text", text: "✅ [UI Automation] Testing Completed Successfully. Run ID: #\($run_id)\n\n\($report)"}]}]}}' \
            > comment_payload.json

          curl --request POST \
            --url "${{ secrets.JIRA_BASE_URL }}/rest/api/3/issue/${{ env.JIRA_KEY }}/comment" \
            --user "${{ secrets.JIRA_EMAIL }}:${{ secrets.JIRA_API_TOKEN }}" \
            --header "Accept: application/json" \
            --header "Content-Type: application/json" \
            --data @comment_payload.json
